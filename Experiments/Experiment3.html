<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment3</title>
    <link rel="stylesheet" href="experiment3.css">
    <style>
    body{
  font-family: Arial;  
  display: flex;
  justify-content: center;
  background-color: #f4f4f4;
}
.container{
  background-color: white;
  text-align: center;  
  width: auto;
  height: auto;
  border-radius: 10px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.5);
  margin: auto;
  padding: 10px;
}
input{
    height: 30px;
    width: 300px;
    border-radius: 7px;
    padding: 5px;
}
button{
 background-color: rgb(65, 62, 240);  
 color: #f4f4f4;
 font-size: medium;
 border-radius: 5px; 
 border: none;
 margin: 10px;
 padding: 5px;
 cursor: pointer;

}
</style>

</head>
<body>
    <div class="container">
        <h2 id="mainHeading"></h2>
        <input type="text" id="userInput" placeholder="Enter new heading text ">
        <br><br>
        <button id="changeHeading">Change Heading</button>
        <button id="changeBackground">Change Background</button>
        <button id="changeFontsize">Increase Font Size</button>
        <br>
        <button id="toggleBtn">Show/Hide Paragraph</button>
        <button id="resetBtn">Reset</button>
        <p id="paraGraph">"This is a sample paragraph.JavaScript event can dynamically change content." </p>
    </div>
        <script src="experiment3.js"></script>

</body>
</html>
