<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of N Numbers</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            font-family:Arial,sans-serif;
            text-align:center;
            margin-top:100px;
            background-color:#f4f4f4;
        }
        .container {
            background:lavender;
            width:60%;
            height:90%;
            margin:auto;
            padding:20px 10px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        input {
            width:80%;
            padding:10px;
            margin-bottom:20px;
        }
        button {
            padding:10px 20px;
            cursor:pointer;
            background-color: rgb(0, 102, 255);
            border-radius:2px;
        }
        button:hover {
            background-color: skyblue;
        }
        h2 {
            color:purple;
        }
        #result {
            margin-top:15px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sum of N Numbers</h2>
        <input type="number" id="n" placeholder="Enter N">
        <br>
        <button onclick="calculateSum()">Find Sum</button>
        <p id="result"></p>
    </div>
    <script>
        function calculateSum() {
            let n=parseInt(document.getElementById("n").value);
            let sum=0;
            for(let i=1;i<=n;i++) {
                sum+=i;
            }
            document.getElementById("result").innerHTML="Sum of first "+n+" numbers="+sum;
        }
    </script>
</body>
</html>
